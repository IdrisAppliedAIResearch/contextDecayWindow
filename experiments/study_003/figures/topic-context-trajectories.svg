  <title id="figure-title">Topic-count and constructed-context trajectories across 120 turns</title>
  <desc id="figure-description">The topic count briefly rose to two before a turn-20 merge, then tracked scripted domain transitions to four topics. A mixed-domain query created a fifth topic at turn 114, and four turn-120 merges collapsed the count to one. Estimated constructed context peaked at 9,189 tokens on turn 80.</desc>

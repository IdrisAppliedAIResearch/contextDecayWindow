<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="figure-title figure-description">
  <title id="figure-title">Study 003 design and principal outcomes</title>
  <desc id="figure-description">A 120-turn conversation crossed four scripted domains. LTM promotion fired at turns 31, 61, and 91. The accepted run scored 12 of 13 rubric points, passed two of three pre-registered bars, promoted 21 of 90 evaluated episodes, and collapsed from five topics to one at turn 120.</desc>

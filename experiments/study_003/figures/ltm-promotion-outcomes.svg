<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="figure-title figure-description">
  <title id="figure-title">LTM promotion volume and trigger routes</title>
  <desc id="figure-description">Thirty episodes were evaluated at each of three outgoing domain transitions. Twelve civil-engineering, seven Renaissance-art, and two monetary-policy episodes were promoted. Marine biology was structurally unevaluated. Of 21 promoted episodes, 12 used the weighted threshold, seven used an all-or-nothing novelty trigger, and two used an all-or-nothing repetition trigger.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5D6975"/>
    </marker>
    <pattern id="probe-hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#C85A16" stroke-width="2" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="1200" height="650" fill="#FFFFFF"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" shape-rendering="geometricPrecision">
  <text x="40" y="42" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">A</text>
  <text x="70" y="42" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">Promotion by outgoing scripted domain</text>
  <text x="70" y="114" font-size="15" font-weight="500" fill="#17212B" text-anchor="start">Civil engineering</text>
  <rect x="300" y="92" width="650" height="30" rx="4" fill="#E5EAEE"/>
  <rect x="300" y="92" width="260.0" height="30" rx="4" fill="#2474A6"/>
  <text x="430.0" y="113" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">12</text>
  <text x="968" y="113" font-size="15" font-weight="500" fill="#17212B" text-anchor="start">12/30 · 40.0%</text>
  <text x="70" y="196" font-size="15" font-weight="500" fill="#17212B" text-anchor="start">Renaissance art</text>
  <rect x="300" y="174" width="650" height="30" rx="4" fill="#E5EAEE"/>
  <rect x="300" y="174" width="151.67" height="30" rx="4" fill="#2474A6"/>
  <text x="375.83" y="195" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">7</text>
  <text x="968" y="195" font-size="15" font-weight="500" fill="#17212B" text-anchor="start">7/30 · 23.3%</text>
  <text x="70" y="278" font-size="15" font-weight="500" fill="#17212B" text-anchor="start">Monetary policy</text>
  <rect x="300" y="256" width="650" height="30" rx="4" fill="#E5EAEE"/>
  <rect x="300" y="256" width="43.33" height="30" rx="4" fill="#2474A6"/>
  <text x="321.67" y="277" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="968" y="277" font-size="15" font-weight="500" fill="#17212B" text-anchor="start">2/30 · 6.7%</text>
  <text x="70" y="360" font-size="15" font-weight="500" fill="#17212B" text-anchor="start">Marine biology</text>
  <rect x="300" y="338" width="650" height="30" rx="4" fill="#FFFFFF" stroke="#89949E" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="625.0" y="359" font-size="14" font-weight="400" fill="#5D6975" text-anchor="middle">not evaluated — no outgoing transition</text>
  <text x="300" y="396" font-size="12" font-weight="400" fill="#5D6975" text-anchor="start">bar width represents 30 evaluated episodes</text>
  <line x1="40" y1="444" x2="1160" y2="444" stroke="#D8E0E6" stroke-width="1"/>
  <text x="40" y="486" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">B</text>
  <text x="70" y="486" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">Promotion route composition</text>
  <rect x="300" y="520" width="371.43" height="38" fill="#2474A6"/>
  <text x="485.71" y="545" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle">12</text>
  <rect x="671.43" y="520" width="216.67" height="38" fill="#18835D"/>
  <text x="779.76" y="545" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle">7</text>
  <rect x="888.1" y="520" width="61.9" height="38" fill="#7656A8"/>
  <text x="919.05" y="545" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle">2</text>
  <rect x="300" y="579" width="14" height="14" rx="2" fill="#2474A6"/>
  <text x="321" y="591" font-size="13" font-weight="400" fill="#17212B" text-anchor="start">weighted threshold: 12</text>
  <rect x="520" y="579" width="14" height="14" rx="2" fill="#18835D"/>
  <text x="541" y="591" font-size="13" font-weight="400" fill="#17212B" text-anchor="start">novelty ≥ 0.90: 7</text>
  <rect x="740" y="579" width="14" height="14" rx="2" fill="#7656A8"/>
  <text x="761" y="591" font-size="13" font-weight="400" fill="#17212B" text-anchor="start">repetition ≥ 0.90: 2</text>
  <text x="70" y="547" font-size="16" font-weight="500" fill="#17212B" text-anchor="start">21 unique</text>
  <text x="70" y="569" font-size="14" font-weight="400" fill="#5D6975" text-anchor="start">promotions</text>
  <text x="1010" y="539" font-size="20" font-weight="500" fill="#2474A6" text-anchor="start">21/90</text>
  <text x="1010" y="563" font-size="13" font-weight="400" fill="#5D6975" text-anchor="start">23.33% of evaluated</text>
  <text x="1010" y="583" font-size="13" font-weight="400" fill="#5D6975" text-anchor="start">17.50% of all 120 STM</text>
  </g>
</svg>
